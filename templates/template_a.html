<head>
<meta charset="utf-8">
<title>PURE+ · Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     PURE+ — Meta Catalog banner "Editorial Split" v2
     1080 x 1080 — Production template (Jinja2)
     ========================================================= */
  :root{
    --pp-blue:      #08539B;   /* brand blue, extracted from logo */
    --pp-blue-deep: #063F76;
    --pp-cream:     #ffffff;   /* right panel is now pure white */
    --pp-ink:       #14304a;
    --pp-promo:     #E05A2B;   /* discount orange */
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    font-family:'Manrope',sans-serif; color:var(--pp-ink);
  }

  .pp-banner{
    width:1080px; height:1080px;
    display:flex; position:relative; overflow:hidden;
    background:#ffffff;
    font-family:'Manrope',sans-serif;
  }

  /* LEFT — brand blue column.
     3-row grid: logo (auto) / middle content (1fr) / tagline (auto).
     The middle row holds category + title + price and has a FIXED
     height (1fr of the column), so the title shrinks only within
     the space that's actually left — no squashing into logo/price. */
  .pp-left{
    width:50%; background:var(--pp-blue); color:#fff;
    padding:64px 52px;
    display:grid;
    grid-template-rows:auto 1fr auto;
    row-gap:32px;
    position:relative;
    overflow:hidden;
  }

  .pp-logo-img{
    height:78px; width:auto; display:block;
  }

  /* middle zone — category at top, price pinned at bottom,
     title fills the remaining space between them */
  .pp-middle{
    min-height:0;            /* allow grid child to shrink */
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  .pp-category{
    font-size:24px; opacity:.75; letter-spacing:.18em;
    text-transform:uppercase; font-weight:700; margin-bottom:24px;
    line-height:1.3; flex:0 0 auto;
  }

  /* Product name — fills available space; font-size auto-fit via JS */
  .pp-name{
    font-family:'Lora',serif; font-weight:600;
    line-height:1.14; margin:0;
    letter-spacing:-0.01em;
    /* normal wrapping at spaces; break long words ONLY as last resort */
    overflow-wrap:break-word; word-break:normal;
    hyphens:none;
    flex:1 1 auto; min-height:0; overflow:hidden;
    display:flex; align-items:flex-start;
  }

  .pp-price-block{
    border-top:2px solid rgba(255,255,255,.28);
    padding-top:30px; margin-top:28px;
    flex:0 0 auto;
  }
  .pp-old{
    font-size:34px; opacity:.62;
    text-decoration:line-through; text-decoration-thickness:3px;
    margin-bottom:10px; font-weight:500;
  }
  .pp-new{
    font-size:82px; font-weight:800; letter-spacing:-0.02em; line-height:1;
  }
  .pp-tagline-bottom{
    font-size:23px; opacity:.6; letter-spacing:.08em; font-weight:600;
  }

  /* RIGHT — product photo on pure white, full bleed */
  .pp-right{
    width:50%; position:relative;
    background:#ffffff;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    overflow:hidden;
  }
  .pp-product{
    width:100%; height:100%; object-fit:contain;
  }

  /* promo badge — two-line: percent big, "отстъпка" small */
  .pp-badge{
    position:absolute; top:48px; right:48px;
    background:var(--pp-promo); color:#fff;
    padding:18px 26px; border-radius:12px;
    text-align:center; line-height:1;
    box-shadow:0 12px 28px rgba(220,90,43,.38);
  }
  .pp-badge .pct{
    font-weight:800; font-size:52px; letter-spacing:-0.02em;
    display:block;
  }
  .pp-badge .lbl{
    font-weight:700; font-size:22px; letter-spacing:.04em;
    text-transform:uppercase; display:block; margin-top:6px; opacity:.95;
  }
</style>
</head>
